name: Update Netflix Data

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours (adjust if needed)
  workflow_dispatch:        # allows manual run

concurrency:
  group: netflix-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # IMPORTANT for pull/rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run your script
        run: |
          python your_script.py   # <-- change to your actual file

      - name: Commit and push (bulletproof)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Automated data update"

            for i in 1 2 3
            do
              git pull --rebase origin main && break
              echo "Retrying pull... ($i)"
              sleep 2
            done

            git push origin main
          else
            echo "No changes to commit"
          fi
