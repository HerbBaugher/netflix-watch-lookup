name: Update Netflix Data

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:

concurrency:
  group: netflix-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Run script (MAKE SURE NAME MATCHES)
      - name: Run update script
        run: |
          python run_update_pipeline.py

      # 5. Commit & push ONLY if changed
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add netflix_data.csv

          if ! git diff --cached --quiet; then
            git commit -m "Automated Netflix data update"
            git push
          else
            echo "No changes to commit"
          fi
